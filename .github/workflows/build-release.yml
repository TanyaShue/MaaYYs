name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-and-commit:
    name: Update version and commit
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.commit_push.outputs.commit_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'


  build:
    name: Build ${{ matrix.platform }}
    needs: update-and-commit
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            mxu_pattern: 'MXU-win-x86_64-*.zip'
            maafw_pattern: 'MAA-win-x86_64-*.zip'
            mxu_ext: '.exe'
            agent_ext: '.exe'
          - platform: macos-x64
            runner: macos-15-intel
            mxu_pattern: 'MXU-macos-x86_64-*.tar.gz'
            maafw_pattern: 'MAA-macos-x86_64-*.zip'
            mxu_ext: ''
            agent_ext: ''
          - platform: macos-arm64
            runner: macos-14
            mxu_pattern: 'MXU-macos-aarch64-*.tar.gz'
            maafw_pattern: 'MAA-macos-aarch64-*.zip'
            mxu_ext: ''
            agent_ext: ''
          - platform: linux-x64
            runner: ubuntu-latest
            mxu_pattern: 'MXU-linux-x86_64-*.tar.gz'
            maafw_pattern: 'MAA-linux-x86_64-*.zip'
            mxu_ext: ''
            agent_ext: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-and-commit.outputs.commit_sha }}
          path: source
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Python (Unix)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # ================== Generate Changelog ==================
      - name: Generate Changelog (Windows)
        if: runner.os == 'Windows'
        id: changelog_windows
        shell: pwsh
        working-directory: source
        run: |
          $currentTag = "${{ github.ref_name }}"
          $latestStableTag = git tag --sort=-v:refname | Select-String -Pattern '-beta' -NotMatch | Select-String -Pattern '-rc' -NotMatch | Select-String -Pattern "^$currentTag$" -NotMatch | Select-Object -First 1

          if (-not $latestStableTag) {
            $previousTag = git rev-list --max-parents=0 HEAD
            Write-Host "No stable tag found, using initial commit as baseline."
          } else {
            $previousTag = $latestStableTag
            Write-Host "Found latest stable tag: $previousTag"
          }

          $changelog = git log --pretty=format:"* %s (%h)" --invert-grep --grep="^ci: Update resource_version" "$previousTag..$currentTag"
          if (-not $changelog) {
            $changelog = "* 首次发布或无用户提交"
          }
          $changelog = $changelog -replace "`n", "%0A"
          "CHANGELOG<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $changelog | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate Changelog (Unix)
        if: runner.os != 'Windows'
        id: changelog_unix
        shell: bash
        working-directory: source
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          LATEST_STABLE_TAG=$(git tag --sort=-v:refname | grep -v -- '-beta' | grep -v -- '-rc' | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -z "$LATEST_STABLE_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "No stable tag found, using initial commit as baseline."
          else
            PREVIOUS_TAG=$LATEST_STABLE_TAG
            echo "Found latest stable tag: $PREVIOUS_TAG"
          fi

          CHANGELOG=$(git log --pretty=format:"* %s (%h)" --invert-grep --grep="^ci: Update resource_version" "$PREVIOUS_TAG..$CURRENT_TAG")
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="* 首次发布或无用户提交"
          fi
          {
            echo 'CHANGELOG<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # ================== Download MXU Release ==================
      - name: Download MXU release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path "mxu-download" -ItemType Directory -Force
          Write-Host "Fetching latest MXU release..."
          $headers = @{ "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/MistEO/MXU/releases/latest" -Headers $headers

          # Find asset matching the pattern
          $pattern = "${{ matrix.mxu_pattern }}"
          $asset = $release.assets | Where-Object { $_.name -like $pattern } | Select-Object -First 1

          if (-not $asset) {
            Write-Host "::error::Could not find asset matching pattern: $pattern"
            Write-Host "Available assets:"
            $release.assets | ForEach-Object { Write-Host "  $($_.name)" }
            exit 1
          }

          $downloadUrl = $asset.browser_download_url
          Write-Host "Downloading MXU from: $downloadUrl"

          $retryCount = 3
          $retryDelay = 5
          for ($i=1; $i -le $retryCount; $i++) {
            try {
              Write-Host "Download attempt $i of $retryCount..."
              Invoke-WebRequest -Uri $downloadUrl -OutFile "mxu-download/mxu.zip"
              Write-Host "Download successful."
              break
            } catch {
              Write-Host "::warning::Download failed on attempt $i. Error: $_"
              if ($i -lt $retryCount) {
                Write-Host "Retrying in $retryDelay seconds..."
                Start-Sleep -Seconds $retryDelay
              } else {
                Write-Host "::error::Failed to download after $retryCount attempts."
                exit 1
              }
            }
          }

          # Extract and find exe in subfolder
          Expand-Archive -Path "mxu-download/mxu.zip" -DestinationPath "mxu-extracted" -Force

          # Find exe file recursively and copy to root
          $exeFile = Get-ChildItem -Path "mxu-extracted" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exeFile) {
            Write-Host "::error::No exe file found in MXU package"
            exit 1
          }

          Write-Host "Found exe: $($exeFile.FullName)"
          Copy-Item -Path $exeFile.FullName -Destination "mxu.exe" -Force
          Write-Host "MXU extracted successfully as mxu.exe"

      - name: Download MXU release (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p mxu-download
          echo "Fetching latest MXU release..."
          RELEASE_JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/MistEO/MXU/releases/latest)

          # Find asset matching the pattern
          PATTERN="${{ matrix.mxu_pattern }}"
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys, json, fnmatch; data = json.load(sys.stdin); pattern = '$PATTERN'; print([asset['browser_download_url'] for asset in data.get('assets', []) if fnmatch.fnmatch(asset['name'], pattern)][0])" 2>/dev/null | head -n1)

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Could not find asset matching pattern: $PATTERN"
            echo "Available assets:"
            echo "$RELEASE_JSON" | python3 -c "import sys, json; data = json.load(sys.stdin); [print(asset['name']) for asset in data.get('assets', [])]"
            exit 1
          fi

          echo "Downloading MXU from: $DOWNLOAD_URL"
          retry_count=3
          retry_delay=5
          for i in $(seq 1 $retry_count); do
            echo "Download attempt $i of $retry_count..."
            if curl -L --fail -o "mxu-download/mxu.tar.gz" "$DOWNLOAD_URL"; then
              echo "Download successful."
              # Verify file is not empty
              if [ -s "mxu-download/mxu.tar.gz" ]; then
                break
              else
                echo "::warning::Downloaded file is empty, retrying..."
              fi
            fi
            if [ $i -lt $retry_count ]; then
              echo "::warning::Download failed. Retrying in $retry_delay seconds..."
              sleep $retry_delay
            else
              echo "::error::Failed to download after $retry_count attempts."
              exit 1
            fi
          done

          # Extract and find executable in subfolder
          mkdir -p mxu-extracted
          echo "Extracting MXU archive..."
          if ! tar -xzf "mxu-download/mxu.tar.gz" -C mxu-extracted; then
            echo "::error::Failed to extract MXU archive"
            ls -la mxu-download/
            exit 1
          fi

          echo "Extracted contents:"
          ls -laR mxu-extracted/

          # Try multiple methods to find the mxu executable
          # Method 1: Direct file in root of extracted directory
          if [ -f "mxu-extracted/mxu" ]; then
            MXU_FILE="mxu-extracted/mxu"
            echo "Found mxu directly in extracted root: $MXU_FILE"
          # Method 2: Find by name with execute permission
          elif MXU_FILE=$(find mxu-extracted -type f -name "mxu" -perm +111 2>/dev/null | head -n1); then
            echo "Found mxu via find with perm: $MXU_FILE"
          # Method 3: Find by name (any file)
          elif MXU_FILE=$(find mxu-extracted -type f -name "mxu" 2>/dev/null | head -n1); then
            echo "Found mxu via find by name: $MXU_FILE"
          # Method 4: Find any executable file
          elif MXU_FILE=$(find mxu-extracted -type f -perm +111 2>/dev/null | head -n1); then
            echo "Found executable via perm search: $MXU_FILE"
          else
            MXU_FILE=""
          fi

          if [ -z "$MXU_FILE" ]; then
            echo "::error::No mxu executable file found in MXU package"
            exit 1
          fi

          echo "Using executable: $MXU_FILE"
          cp "$MXU_FILE" mxu
          chmod +x mxu
          echo "MXU extracted successfully as mxu"
          ls -la mxu

      # ================== Compile Go Agent ==================
      - name: Compile Go Agent (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Checking source/agent directory..."
          if (-not (Test-Path -Path "source/agent")) {
            Write-Host "::error::source/agent directory not found!"
            Get-ChildItem -Path "source" -ErrorAction SilentlyContinue
            exit 1
          }

          $env:CGO_ENABLED = "0"
          $version = "${{ github.ref_name }}"

          Write-Host "Running go build..."
          Push-Location source/agent
          go build -ldflags "-s -w -X main.Version=$version" -o agent.exe .
          $buildExitCode = $LASTEXITCODE
          Pop-Location

          if ($buildExitCode -ne 0) {
            Write-Host "::error::Go build failed with exit code $buildExitCode"
            exit 1
          }

          if (-not (Test-Path -Path "source/agent/agent.exe")) {
            Write-Host "::error::agent.exe was not created!"
            exit 1
          }
          Write-Host "Go agent compiled successfully"

          # Create agent directory in root and move agent.exe there
          New-Item -Path "agent" -ItemType Directory -Force
          Move-Item -Path "source/agent/agent.exe" -Destination "agent/agent.exe" -Force

          Write-Host "Verifying agent directory was created..."
          if (Test-Path -Path "agent/agent.exe") {
            Write-Host "Agent successfully moved to: $((Get-Item 'agent/agent.exe').FullName)"
          } else {
            Write-Host "::error::Failed to move agent.exe to agent/"
            exit 1
          }

      - name: Compile Go Agent (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "Current directory: $(pwd)"
          echo "Checking source/agent directory..."
          if [ ! -d "source/agent" ]; then
            echo "::error::source/agent directory not found!"
            ls -la source/ 2>/dev/null || true
            exit 1
          fi

          echo "Go files present:"
          ls -la source/agent/*.go 2>/dev/null || true

          cd source/agent
          CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }}" -o agent .
          if [ $? -ne 0 ]; then
            echo "::error::Go build failed!"
            exit 1
          fi
          cd ../..

          if [ ! -f "source/agent/agent" ]; then
            echo "::error::agent binary was not created!"
            exit 1
          fi
          echo "Go agent compiled successfully: $(ls -la source/agent/agent)"

          # Create agent directory in root and move agent binary there
          mkdir -p agent
          mv source/agent/agent agent/agent
          chmod +x agent/agent

          echo "Verifying agent directory was created..."
          if [ -f "agent/agent" ]; then
            echo "Agent successfully moved to: $(ls -la agent/agent)"
          else
            echo "::error::Failed to move agent to agent/"
            exit 1
          fi

      # ================== Download MaaFramework Release ==================
      - name: Download MaaFramework release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path "maafw-download" -ItemType Directory -Force
          Write-Host "Fetching latest MaaFramework release..."
          $headers = @{ "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/MaaXYZ/MaaFramework/releases/latest" -Headers $headers

          # Find asset matching the pattern
          $pattern = "${{ matrix.maafw_pattern }}"
          $asset = $release.assets | Where-Object { $_.name -like $pattern } | Select-Object -First 1

          if (-not $asset) {
            Write-Host "::error::Could not find asset matching pattern: $pattern"
            Write-Host "Available assets:"
            $release.assets | ForEach-Object { Write-Host "  $($_.name)" }
            exit 1
          }

          $downloadUrl = $asset.browser_download_url
          Write-Host "Downloading MaaFramework from: $downloadUrl"

          $retryCount = 3
          $retryDelay = 5
          for ($i=1; $i -le $retryCount; $i++) {
            try {
              Write-Host "Download attempt $i of $retryCount..."
              Invoke-WebRequest -Uri $downloadUrl -OutFile "maafw-download/maafw.zip"
              Write-Host "Download successful."
              break
            } catch {
              Write-Host "::warning::Download failed on attempt $i. Error: $_"
              if ($i -lt $retryCount) {
                Write-Host "Retrying in $retryDelay seconds..."
                Start-Sleep -Seconds $retryDelay
              } else {
                Write-Host "::error::Failed to download after $retryCount attempts."
                exit 1
              }
            }
          }

          # Extract
          Expand-Archive -Path "maafw-download/maafw.zip" -DestinationPath "maafw-extracted" -Force

          # Copy contents of bin folder to maafw directory (flatten structure)
          New-Item -Path "maafw" -ItemType Directory -Force
          if (Test-Path -Path "maafw-extracted/bin") {
            Copy-Item -Path "maafw-extracted/bin/*" -Destination "maafw/" -Recurse -Force
            Write-Host "MaaFramework bin contents copied to maafw directory"
          } else {
            Write-Host "::error::bin folder not found in MaaFramework package"
            exit 1
          }

      - name: Download MaaFramework release (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p maafw-download
          echo "Fetching latest MaaFramework release..."
          RELEASE_JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/MaaXYZ/MaaFramework/releases/latest)

          # Find asset matching the pattern
          PATTERN="${{ matrix.maafw_pattern }}"
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys, json, fnmatch; data = json.load(sys.stdin); pattern = '$PATTERN'; print([asset['browser_download_url'] for asset in data.get('assets', []) if fnmatch.fnmatch(asset['name'], pattern)][0])" 2>/dev/null | head -n1)

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Could not find asset matching pattern: $PATTERN"
            echo "Available assets:"
            echo "$RELEASE_JSON" | python3 -c "import sys, json; data = json.load(sys.stdin); [print(asset['name']) for asset in data.get('assets', [])]"
            exit 1
          fi

          echo "Downloading MaaFramework from: $DOWNLOAD_URL"
          retry_count=3
          retry_delay=5
          for i in $(seq 1 $retry_count); do
            echo "Download attempt $i of $retry_count..."
            curl -L --fail -o "maafw-download/maafw.zip" "$DOWNLOAD_URL"
            if [ $? -eq 0 ]; then
              echo "Download successful."
              break
            fi
            if [ $i -lt $retry_count ]; then
              echo "::warning::Download failed. Retrying in $retry_delay seconds..."
              sleep $retry_delay
            else
              echo "::error::Failed to download after $retry_count attempts."
              exit 1
            fi
          done

          # Extract
          mkdir -p maafw-extracted
          unzip -o "maafw-download/maafw.zip" -d maafw-extracted

          # Copy contents of bin folder to maafw directory (flatten structure)
          mkdir -p maafw
          if [ -d "maafw-extracted/bin" ]; then
            cp -r maafw-extracted/bin/* maafw/
            echo "MaaFramework bin contents copied to maafw directory"
          else
            echo "::error::bin folder not found in MaaFramework package"
            exit 1
          fi

      # ================== Prepare Package Directory ==================
      - name: Prepare package directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Directory contents:"
          Get-ChildItem -Path "." -ErrorAction SilentlyContinue

          New-Item -Path "package" -ItemType Directory -Force

          # Verify and copy mxu.exe
          if (-not (Test-Path -Path "mxu.exe")) {
            Write-Host "::error::mxu.exe not found!"
            exit 1
          }
          Copy-Item -Path "mxu.exe" -Destination "package/mxu.exe" -Force
          Write-Host "Copied mxu.exe"

          # Verify and copy agent
          if (-not (Test-Path -Path "agent")) {
            Write-Host "::error::agent directory not found! Checking if agent.exe exists elsewhere..."
            Get-ChildItem -Path "." -Recurse -Filter "agent.exe" -ErrorAction SilentlyContinue
            exit 1
          }
          Copy-Item -Path "agent" -Destination "package/agent" -Recurse -Force
          Write-Host "Copied agent directory"

          # Verify and copy maafw
          if (-not (Test-Path -Path "maafw")) {
            Write-Host "::error::maafw directory not found!"
            exit 1
          }
          Copy-Item -Path "maafw" -Destination "package/maafw" -Recurse -Force
          Write-Host "Copied maafw directory"

          # Copy resource files
          $includeList = @('assets', 'resource_pack', 'interface.json', 'LICENSE', 'README.md')
          foreach ($item in $includeList) {
            $sourcePath = "source/$item"
            if (Test-Path -Path $sourcePath) {
              if (Test-Path -Path $sourcePath -PathType Container) {
                Copy-Item -Path $sourcePath -Destination "package/$item" -Recurse -Force
              } else {
                Copy-Item -Path $sourcePath -Destination "package/$item" -Force
              }
              Write-Host "Copied $item"
            } else {
              Write-Host "::warning::$item not found at $sourcePath"
            }
          }


          Write-Host "Package directory prepared successfully"
          Get-ChildItem -Path "package" -Recurse | Select-Object FullName

      - name: Prepare package directory (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la

          mkdir -p package

          # Verify and copy mxu
          if [ ! -f "mxu" ]; then
            echo "::error::mxu not found!"
            exit 1
          fi
          cp mxu package/mxu
          chmod +x package/mxu
          echo "Copied mxu"

          # Verify and copy agent
          if [ ! -d "agent" ]; then
            echo "::error::agent directory not found! Checking if agent binary exists elsewhere..."
            find . -name "agent" -type f 2>/dev/null || true
            exit 1
          fi
          cp -r agent package/agent
          chmod +x package/agent/agent
          echo "Copied agent directory"

          # Verify and copy maafw
          if [ ! -d "maafw" ]; then
            echo "::error::maafw directory not found!"
            exit 1
          fi
          cp -r maafw package/maafw
          echo "Copied maafw directory"

          # Copy resource files
          INCLUDE_LIST="assets resource_pack interface.json LICENSE README.md"
          for item in $INCLUDE_LIST; do
            if [ -e "source/$item" ]; then
              cp -r "source/$item" "package/$item"
              echo "Copied $item"
            else
              echo "::warning::$item not found at source/$item"
            fi
          done

          echo "Package directory prepared successfully"
          ls -laR package/

      # ================== Create Archive ==================
      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path "dist" -ItemType Directory -Force
          $version = "${{ github.ref_name }}"
          $archiveName = "MAA_YYS_${{ matrix.platform }}_$version.zip"
          Compress-Archive -Path "package/*" -DestinationPath "dist/$archiveName" -Force
          Write-Host "Created archive: $archiveName"

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          ARCHIVE_NAME="MAA_YYS_${{ matrix.platform }}_${VERSION}.tar.gz"
          (cd package && tar -czf "../dist/${ARCHIVE_NAME}" .)
          echo "Created archive: $ARCHIVE_NAME"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: dist/*
          retention-days: 7

  release:
    name: Create Release
    needs: [build, update-and-commit]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-and-commit.outputs.commit_sha }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate Changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          LATEST_STABLE_TAG=$(git tag --sort=-v:refname | grep -v -- '-beta' | grep -v -- '-rc' | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -z "$LATEST_STABLE_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "No stable tag found, using initial commit as baseline."
          else
            PREVIOUS_TAG=$LATEST_STABLE_TAG
            echo "Found latest stable tag: $PREVIOUS_TAG"
          fi

          echo "Generating changelog between $PREVIOUS_TAG and $CURRENT_TAG"

          CHANGELOG=$(git log --pretty=format:"* %s (%h)" --invert-grep --grep="^ci: Update resource_version" "$PREVIOUS_TAG..$CURRENT_TAG")

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="* 首次发布或本次发布无用户提交。"
          fi

          {
            echo 'CHANGELOG<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          mkdir -p release_files
          find ./artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec mv {} ./release_files/ \;
          echo "Release files:"
          ls -la ./release_files/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 版本 ${{ github.ref_name }} 更新日志

            ${{ steps.changelog.outputs.CHANGELOG }}

            [已有 Mirror酱 CDK？点击前往高速下载](https://mirrorchyan.com/zh/projects?rid=MaaYYs)
          draft: false
          prerelease: false
          artifacts: ./release_files/*
          artifactContentType: application/octet-stream
          artifactErrorsFailBuild: true

      - name: Trigger MirrorChyanUploading
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}