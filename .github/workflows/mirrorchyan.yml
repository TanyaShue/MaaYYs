name: mirrorchyan

on:
  workflow_dispatch:
    inputs:
      tag:
        default: ""
        required: false

jobs:
  mirrorchyan_mxu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: win
            arch: x86_64
          - os: win
            arch: aarch64
          - os: macos
            arch: x86_64
          - os: macos
            arch: aarch64
          - os: linux
            arch: x86_64
    steps:
      - uses: MirrorChyan/uploading-action@v1
        with:
          filetype: latest-release
          filename: ${{ format('MaaYYs-{0}-{1}-*-MXU*', matrix.os, matrix.arch) }}
          mirrorchyan_rid: MaaYYs
          tag: ${{ inputs.tag }}

          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

          owner: TanyaShue
          repo: MaaYYs
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_token: ${{ secrets.MirrorChyanUploadToken }}
